<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1200" height="300" fill="url(#skyGradient)"/>
  
  <!-- Ground -->
  <rect y="300" width="1200" height="300" fill="url(#groundGradient)"/>
  
  <!-- Sun -->
  <circle cx="1000" cy="80" r="60" fill="#FFD700"/>
  
  <!-- Clouds -->
  <ellipse cx="200" cy="100" rx="80" ry="40" fill="white" opacity="0.8"/>
  <ellipse cx="250" cy="110" rx="60" ry="35" fill="white" opacity="0.8"/>
  <ellipse cx="150" cy="110" rx="50" ry="30" fill="white" opacity="0.8"/>
  
  <ellipse cx="800" cy="120" rx="70" ry="35" fill="white" opacity="0.7"/>
  <ellipse cx="850" cy="130" rx="55" ry="30" fill="white" opacity="0.7"/>
  
  <!-- Mountains in background -->
  <polygon points="100,300 400,100 700,300" fill="#8B7355" opacity="0.6"/>
  <polygon points="500,300 800,80 1100,300" fill="#A0826D" opacity="0.6"/>
  
  <!-- Trees on left -->
  <g id="tree1">
    <rect x="150" y="400" width="30" height="100" fill="#654321"/>
    <circle cx="165" cy="380" r="60" fill="#228B22"/>
    <circle cx="120" cy="390" r="40" fill="#2d5016"/>
    <circle cx="210" cy="390" r="40" fill="#2d5016"/>
  </g>
  
  <g id="tree2" transform="translate(150, 0)">
    <rect x="150" y="400" width="30" height="100" fill="#654321"/>
    <circle cx="165" cy="380" r="60" fill="#228B22"/>
    <circle cx="120" cy="390" r="40" fill="#2d5016"/>
    <circle cx="210" cy="390" r="40" fill="#2d5016"/>
  </g>
  
  <!-- Trees on right -->
  <g id="tree3" transform="translate(850, 0)">
    <rect x="150" y="400" width="30" height="100" fill="#654321"/>
    <circle cx="165" cy="380" r="60" fill="#228B22"/>
    <circle cx="120" cy="390" r="40" fill="#2d5016"/>
    <circle cx="210" cy="390" r="40" fill="#2d5016"/>
  </g>
  
  <g id="tree4" transform="translate(1000, 0)">
    <rect x="150" y="400" width="30" height="100" fill="#654321"/>
    <circle cx="165" cy="380" r="60" fill="#228B22"/>
    <circle cx="120" cy="390" r="40" fill="#2d5016"/>
    <circle cx="210" cy="390" r="40" fill="#2d5016"/>
  </g>
  
  <!-- Grass tufts -->
  <ellipse cx="300" cy="580" rx="15" ry="20" fill="#1a4d1a"/>
  <ellipse cx="350" cy="590" rx="12" ry="15" fill="#1a4d1a"/>
  <ellipse cx="600" cy="570" rx="18" ry="25" fill="#1a4d1a"/>
  <ellipse cx="700" cy="585" rx="14" ry="18" fill="#1a4d1a"/>
  <ellipse cx="900" cy="575" rx="16" ry="22" fill="#1a4d1a"/>
  <ellipse cx="1100" cy="590" rx="20" ry="20" fill="#1a4d1a"/>
</svg>
